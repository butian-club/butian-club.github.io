<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="杭州第二中学步天工程社 Butian Engineering Club">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a1124"/>
      <stop offset="1" stop-color="#111d3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="120" x2="360" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- 轨道装饰 -->
  <g transform="translate(940 150)" opacity="0.7">
    <ellipse rx="220" ry="92" transform="rotate(-28)" stroke="url(#accent)" stroke-width="1.6" fill="none"/>
    <ellipse rx="150" ry="150" stroke="#6aa0ff" stroke-width="1" fill="none" opacity="0.4"/>
    <circle r="6" fill="#22d3ee"/>
  </g>
  <!-- 文案 -->
  <text x="96" y="270" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" letter-spacing="6">BUTIAN ENGINEERING CLUB</text>
  <text x="94" y="360" fill="#ffffff" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="86" font-weight="700">步天工程社</text>
  <text x="96" y="430" fill="#c4d2f0" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30">杭州第二中学 · 学生工程与航天科技社团</text>
  <text x="96" y="492" fill="#93b4ff" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24">把想法变成结构、代码、电路和可验证的结果</text>
  <rect x="96" y="520" width="64" height="4" rx="2" fill="url(#accent)"/>
</svg>
